<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Myntra Ads Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <h1>Product Listing Ads Reports</h1>
        </div>

        <div class="header-right">
            <select id="dateFilter">
                <option value="all">All Data</option>
                <option value="current">Current Month</option>
                <option value="lastMonth">Last Month</option>
                <option value="last7days">Last 7 Days</option>
            </select>

            <span class="last-updated">Last Updated: --</span>
        </div>
    </header>

    <!-- KPI -->
    <section class="kpi-section" id="kpiContainer"></section>

    <!-- CHART -->
    <section class="chart-section">
        <div class="chart-header">
            <select id="metric1"></select>
            <select id="metric2"></select>
        </div>

        <div class="chart-container" style="height:300px;">
            <canvas id="chartCanvas"></canvas>
        </div>
    </section>

    <!-- TABS -->
    <section class="tabs-section">

        <div class="tabs">
            <button class="tab active" data-tab="campaign">Campaigns</button>
            <button class="tab" data-tab="daily">Daily View</button>
            <button class="tab" data-tab="placement">Placement</button>
        </div>

        <!-- SEARCH -->
        <div class="search-bar" id="searchBar">
            <input type="text" placeholder="Search Campaign Name / ID">
        </div>

        <!-- TABLE -->
        <div class="table-container" id="tableContainer"></div>

    </section>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
