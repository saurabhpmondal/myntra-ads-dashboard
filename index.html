<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Myntra Ads Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <h1>Product Listing Ads Reports</h1>
        </div>

        <div class="header-right">
            <select id="dateFilter">
                <option>Current Month</option>
                <option>Last Month</option>
                <option>Last 7 Days</option>
                <option>Custom</option>
            </select>

            <span class="last-updated">Last Updated: --</span>
        </div>
    </header>

    <!-- KPI CARDS -->
    <section class="kpi-section" id="kpiContainer">
        <!-- Cards will be injected -->
    </section>

    <!-- CHART SECTION -->
    <section class="chart-section">
        <div class="chart-header">
            <select id="metric1"></select>
            <select id="metric2"></select>
        </div>

        <div class="chart-container">
            <p>Chart will render here</p>
        </div>
    </section>

    <!-- TABS -->
    <section class="tabs-section">

        <div class="tabs">
            <button class="tab active" data-tab="campaign">Campaigns</button>
            <button class="tab" data-tab="daily">Daily View</button>
            <button class="tab" data-tab="placement">Placement</button>
        </div>

        <!-- SEARCH (ONLY CAMPAIGN) -->
        <div class="search-bar" id="searchBar">
            <input type="text" placeholder="Search Campaign Name / ID">
        </div>

        <!-- TABLE -->
        <div class="table-container" id="tableContainer">
            <table>
                <thead>
                    <tr>
                        <th>Campaign</th>
                        <th>Status</th>
                        <th>Budget</th>
                        <th>Spend</th>
                        <th>Impressions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sample Campaign</td>
                        <td>Active</td>
                        <td>₹10,000</td>
                        <td>₹5,000</td>
                        <td>100,000</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </section>

    <!-- JS -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
